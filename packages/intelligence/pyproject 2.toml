[project]
name = "oie-intelligence"
version = "0.1.0"
description = "OIE predictive intelligence — anomaly detection, predictions, and root-cause analysis"
requires-python = ">=3.12"
license = { text = "Proprietary" }
dependencies = [
    "oie-common",
    "oie-db",
    "numpy>=1.26",
    "scipy>=1.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio",
    "ruff",
]

[build-system]
requires = ["setuptools>=69.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
