[project]
name = "oie-workflows"
version = "0.1.0"
description = "OIE Workflow Automation Engine — configurable multi-step operational workflows"
requires-python = ">=3.12"
license = { text = "Proprietary" }
dependencies = [
    "httpx",
    "jinja2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio",
    "ruff",
]

[build-system]
requires = ["setuptools>=69.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
