[project]
name = "oie-storage"
version = "0.1.0"
description = "OIE object storage abstraction for S3-compatible backends"
requires-python = ">=3.12"
license = { text = "Proprietary" }
dependencies = [
    "boto3",
    "aiobotocore",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio",
    "ruff",
]

[build-system]
requires = ["setuptools>=69.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
