version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: oie-postgres
    environment:
      POSTGRES_USER: oie
      POSTGRES_PASSWORD: oie_password
      POSTGRES_DB: oie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oie -d oie"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oie-network

  redis:
    image: redis:7-alpine
    container_name: oie-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oie-network

  minio:
    image: quay.io/minio/minio
    container_name: oie-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oie-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: oie-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://oie:oie_password@postgres:5432/oie
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin123
      S3_BUCKET_NAME: oie-documents
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - oie-network

  workers:
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    container_name: oie-workers
    environment:
      DATABASE_URL: postgresql+asyncpg://oie:oie_password@postgres:5432/oie
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin123
      S3_BUCKET_NAME: oie-documents
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - oie-network

  scheduler:
    build:
      context: .
      dockerfile: apps/scheduler/Dockerfile
    container_name: oie-scheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://oie:oie_password@postgres:5432/oie
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - oie-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  oie-network:
    driver: bridge
